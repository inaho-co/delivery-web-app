<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン — 稲穂納品書</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { background: #fff; border-radius: 16px; padding: 40px 32px; width: 100%; max-width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); }
h1 { font-size: 20px; color: #1a2332; text-align: center; margin-bottom: 8px; }
.sub { text-align: center; color: #7a8ca0; font-size: 13px; margin-bottom: 32px; }
label { display: block; font-size: 13px; color: #4a5568; margin-bottom: 6px; font-weight: 600; }
input[type=password] { width: 100%; padding: 14px 16px; border: 1.5px solid #d0dae6; border-radius: 10px; font-size: 16px; outline: none; transition: border-color .2s; }
input[type=password]:focus { border-color: #3b82f6; }
.error { background: #fef2f2; color: #dc2626; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }
button { width: 100%; margin-top: 20px; padding: 15px; background: #3b82f6; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
button:active { background: #2563eb; }
</style>
</head>
<body>
<div class="card">
  <h1>🌾 稲穂納品書</h1>
  <p class="sub">スマホ版</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <label>パスワード</label>
    <input type="password" name="password" autocomplete="current-password" autofocus>
    <button type="submit">ログイン</button>
  </form>
</div>
</body>
</html>
